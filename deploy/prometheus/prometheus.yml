global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/serviceguard_alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: serviceguard-backend
    metrics_path: /metrics/prometheus
    static_configs:
      - targets:
          - backend:8000
        labels:
          app: serviceguard
          component: backend

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          app: serviceguard
          component: prometheus
