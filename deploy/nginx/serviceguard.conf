upstream serviceguard_backend {
    server backend:8000;
}

upstream serviceguard_frontend {
    server frontend:8501;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 20m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /health {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location = /ready {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location = /metrics {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location = /metrics/prometheus {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location /api/ {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location /docs {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location /openapi.json {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location /_stcore/ {
        proxy_pass http://serviceguard_frontend;
        include /etc/nginx/serviceguard_proxy_params.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        proxy_pass http://serviceguard_frontend;
        include /etc/nginx/serviceguard_proxy_params.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
