upstream serviceguard_backend {
    server backend:8000;
}

upstream serviceguard_frontend {
    server frontend:8501;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name serviceguard.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name serviceguard.example.com;

    ssl_certificate /etc/nginx/certs/serviceguard.crt;
    ssl_certificate_key /etc/nginx/certs/serviceguard.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 20m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location ~ ^/(health|ready|metrics|metrics/prometheus|openapi.json)$ {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location /api/ {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location /docs {
        proxy_pass http://serviceguard_backend;
        include /etc/nginx/serviceguard_proxy_params.conf;
    }

    location /_stcore/ {
        proxy_pass http://serviceguard_frontend;
        include /etc/nginx/serviceguard_proxy_params.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        proxy_pass http://serviceguard_frontend;
        include /etc/nginx/serviceguard_proxy_params.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
