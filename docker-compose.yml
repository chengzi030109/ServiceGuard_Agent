services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: .env
        required: false
    environment:
      CHROMA_DIR: /app/data/chroma
      SQLITE_URL: sqlite:////app/data/serviceguard.db
      UPLOAD_DIR: /app/data/uploads
      BACKUP_DIR: /app/data/backups
      QUARANTINE_PROMPT_INJECTION_DOCUMENTS: "true"
    ports:
      - "8000:8000"
    volumes:
      - serviceguard-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8501:8501"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  serviceguard-data:
