name: ServiceGuard CI

"on":
  workflow_dispatch:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - "data/sample_docs/**"
      - "data/samples/**"
      - "deploy/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".env.example"
      - "Dockerfile.*"
      - "docker-compose.yml"
      - "docker-compose.gateway.yml"
      - "docker-compose.monitoring.yml"
      - ".dockerignore"
      - ".github/workflows/serviceguard-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - "data/sample_docs/**"
      - "data/samples/**"
      - "deploy/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".env.example"
      - "Dockerfile.*"
      - "docker-compose.yml"
      - "docker-compose.gateway.yml"
      - "docker-compose.monitoring.yml"
      - ".dockerignore"
      - ".github/workflows/serviceguard-ci.yml"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: python -m ruff check .
      - name: Format check
        run: python -m ruff format --check .
      - name: Compile frontend
        run: python -m py_compile frontend/app.py
      - name: Test
        run: python -m pytest
      - name: Evaluate sample tickets
        run: >
          python scripts/run_eval.py
          --tickets data/samples/tickets_sample.csv
          --out data/eval_summary.ci.json
          --report data/eval_report.ci.md
          --min-risk-accuracy 0.95
          --min-violation-accuracy 0.95
          --min-citation-coverage 0.90
          --min-high-risk-recall 0.95
      - name: Smoke test running backend
        run: |
          python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 > backend-smoke.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ready >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/ready >/dev/null || (cat backend-smoke.log && exit 1)
          python scripts/smoke_test.py --base-url http://127.0.0.1:8000 --out data/smoke_summary.ci.json
      - name: Validate Docker Compose
        run: docker compose config
      - name: Validate gateway Docker Compose
        run: docker compose -f docker-compose.yml -f docker-compose.gateway.yml --profile gateway config
      - name: Validate monitoring Docker Compose
        run: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml --profile monitoring config

  container-build:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t serviceguard-backend:ci .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t serviceguard-frontend:ci .
